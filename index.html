<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Developments Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="mission-bar">
  <div class="brand">
    <span class="dot"></span>
    <div>
      <h1>AI Developments Dashboard</h1>
      <div class="subtitle">Monitoring station · 7 channels</div>
    </div>
  </div>
  <div class="mission-bar-right">
    <div class="mission-clock">
      <span class="label">Last sync</span>
      <span id="last-sync">—</span>
    </div>
    <button class="btn secondary refresh-btn" id="refresh-btn" onclick="triggerRefresh()">↻ Refresh now</button>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search-input" class="search-input" placeholder="Search all channels…" oninput="applyFilters()">
  <div class="chip-row" id="chip-row"><!-- category toggle chips injected here --></div>
</div>

<div class="keyword-strip" id="keyword-strip"><!-- trending keywords injected here --></div>

<div class="grid" id="channel-grid">
  <!-- channels injected by dashboard.js -->
</div>

<div class="map-section" id="map-section" style="display:none;">
  <div class="map-header">
    <h2>Governance Signal Map</h2>
    <span class="channel-meta">Recent governance activity by country/region</span>
  </div>
  <div id="map-container"></div>
</div>

<div class="mission-footer">
  <span>Data refreshed on schedule via GitHub Actions</span>
  <a href="control-panel.html">Control panel →</a>
</div>

<div class="toast" id="toast"></div>

<script src="assets/js/site-config.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
